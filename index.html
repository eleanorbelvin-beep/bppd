<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meridian">
<title>Meridian</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0d0d0f;
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.10);
  --coral: #E8714A;
  --peach: #F0A07A;
  --text: #F0EDE8;
  --text-dim: rgba(240,237,232,0.45);
  --text-dimmer: rgba(240,237,232,0.22);
  --gold: #D4A843;
  --sage: #7A9E85;
  --r1: #E8714A;
  --r2: #8A6FD4;
  --r3: #D4A843;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height: -webkit-fill-available; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
  padding-bottom: env(safe-area-inset-bottom, 20px);
  padding-top: env(safe-area-inset-top, 0px);
}
.orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.18; animation:drift 20s ease-in-out infinite; }
.orb-1 { width:500px; height:500px; background:radial-gradient(circle,#E8714A,transparent 70%); top:-150px; right:-100px; animation-delay:0s; }
.orb-2 { width:400px; height:400px; background:radial-gradient(circle,#8A6FD4,transparent 70%); bottom:10%; left:-100px; animation-delay:-7s; }
.orb-3 { width:300px; height:300px; background:radial-gradient(circle,#D4A843,transparent 70%); top:50%; right:10%; animation-delay:-14s; opacity:0.10; }
@keyframes drift {
  0%,100% { transform:translate(0,0) scale(1); }
  33% { transform:translate(30px,-40px) scale(1.05); }
  66% { transform:translate(-20px,30px) scale(0.95); }
}
.app { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:0 20px 100px; }
.loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:16px; }
.loading-logo { font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:300; font-style:italic; color:var(--coral); animation:pulse 2s ease-in-out infinite; }
.loading-sub { font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--text-dimmer); animation:pulse 2s ease-in-out infinite; animation-delay:0.3s; }
@keyframes pulse { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
.header { padding:40px 0 32px; animation:fadeUp 0.6s ease both; }
.header-eyebrow { font-size:8px; letter-spacing:0.35em; text-transform:uppercase; color:var(--coral); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.header-eyebrow::before { content:''; display:inline-block; width:20px; height:1px; background:var(--coral); }
.header h1 { font-family:'Syne',sans-serif; font-size:clamp(32px,8vw,48px); font-weight:800; line-height:0.95; letter-spacing:-0.02em; color:var(--text); }
.header h1 em { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300; color:var(--coral); font-size:1.15em; }
.date-line { font-size:10px; letter-spacing:0.12em; color:var(--text-dimmer); margin-top:12px; }
.quarter-bar { display:flex; gap:8px; margin-bottom:32px; flex-wrap:wrap; animation:fadeUp 0.6s ease 0.1s both; }
.quarter-btn { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.15em; text-transform:uppercase; padding:7px 16px; border:1px solid var(--glass-border); background:var(--glass); color:var(--text-dim); cursor:pointer; border-radius:100px; transition:all 0.25s; backdrop-filter:blur(10px); }
.quarter-btn.active { background:var(--coral); border-color:var(--coral); color:white; box-shadow:0 0 20px rgba(232,113,74,0.35); }
.quarter-btn:hover:not(.active) { border-color:var(--coral); color:var(--text); }
.section-label { font-size:8px; letter-spacing:0.3em; text-transform:uppercase; color:var(--text-dimmer); margin-bottom:12px; }
.energy-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:36px; animation:fadeUp 0.6s ease 0.2s both; }
.energy-btn { padding:18px 16px; border:1px solid var(--glass-border); background:var(--glass); backdrop-filter:blur(20px); cursor:pointer; border-radius:16px; transition:all 0.3s; text-align:left; position:relative; overflow:hidden; }
.energy-btn::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity 0.3s; border-radius:16px; }
.energy-btn.high::before { background:linear-gradient(135deg,rgba(232,113,74,0.2),transparent); }
.energy-btn.low::before { background:linear-gradient(135deg,rgba(122,158,133,0.2),transparent); }
.energy-btn.active::before { opacity:1; }
.energy-btn.active.high { border-color:rgba(232,113,74,0.5); box-shadow:0 0 30px rgba(232,113,74,0.2),inset 0 1px 0 rgba(255,255,255,0.1); }
.energy-btn.active.low { border-color:rgba(122,158,133,0.5); box-shadow:0 0 30px rgba(122,158,133,0.2),inset 0 1px 0 rgba(255,255,255,0.1); }
.energy-dot { width:6px; height:6px; border-radius:50%; margin-bottom:10px; transition:all 0.3s; }
.high .energy-dot { background:var(--coral); box-shadow:0 0 8px var(--coral); }
.low .energy-dot { background:var(--sage); box-shadow:0 0 8px var(--sage); }
.energy-title { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; display:block; margin-bottom:3px; color:var(--text); letter-spacing:-0.01em; }
.energy-sub { font-size:8px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dimmer); }
.goals-section { display:flex; flex-direction:column; gap:20px; margin-bottom:32px; animation:fadeUp 0.6s ease 0.3s both; }
.goal-card { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(20px); border-radius:20px; padding:22px; position:relative; overflow:hidden; transition:border-color 0.3s; animation:fadeUp 0.5s ease both; }
.goal-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent); }
.goal-card.goal-0 { border-top-color:rgba(232,113,74,0.4); }
.goal-card.goal-1 { border-top-color:rgba(138,111,212,0.4); }
.goal-card.goal-2 { border-top-color:rgba(212,168,67,0.4); }
.goal-card:nth-child(1) { animation-delay:0.3s; }
.goal-card:nth-child(2) { animation-delay:0.4s; }
.goal-card:nth-child(3) { animation-delay:0.5s; }
.goal-accent { position:absolute; top:-40px; right:-40px; width:120px; height:120px; border-radius:50%; filter:blur(40px); opacity:0.15; pointer-events:none; }
.goal-card.goal-0 .goal-accent { background:var(--r1); }
.goal-card.goal-1 .goal-accent { background:var(--r2); }
.goal-card.goal-2 .goal-accent { background:var(--r3); }
.goal-number { font-size:8px; letter-spacing:0.3em; text-transform:uppercase; color:var(--text-dimmer); margin-bottom:6px; }
.goal-name { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; font-style:italic; color:var(--text); margin-bottom:4px; line-height:1.25; }
.goal-values { font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dimmer); margin-bottom:18px; }
.actions-list { display:flex; flex-direction:column; gap:6px; }
.action-item { display:flex; align-items:flex-start; gap:12px; cursor:pointer; padding:11px 14px; border-radius:10px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); transition:all 0.2s; user-select:none; -webkit-user-select:none; }
.action-item:hover { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.12); }
.action-item:active { transform:scale(0.98); }
.goal-card.goal-0 .action-item.checked { background:rgba(232,113,74,0.08); border-color:rgba(232,113,74,0.2); opacity:0.7; }
.goal-card.goal-1 .action-item.checked { background:rgba(138,111,212,0.08); border-color:rgba(138,111,212,0.2); opacity:0.7; }
.goal-card.goal-2 .action-item.checked { background:rgba(212,168,67,0.08); border-color:rgba(212,168,67,0.2); opacity:0.7; }
.check-box { width:18px; height:18px; border:1.5px solid rgba(255,255,255,0.2); border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.25s; }
.goal-card.goal-0 .action-item.checked .check-box { background:var(--r1); border-color:var(--r1); box-shadow:0 0 10px rgba(232,113,74,0.5); }
.goal-card.goal-1 .action-item.checked .check-box { background:var(--r2); border-color:var(--r2); box-shadow:0 0 10px rgba(138,111,212,0.5); }
.goal-card.goal-2 .action-item.checked .check-box { background:var(--r3); border-color:var(--r3); box-shadow:0 0 10px rgba(212,168,67,0.5); }
.check-mark { color:white; font-size:9px; display:none; }
.action-item.checked .check-mark { display:block; }
.action-text { font-size:12.5px; line-height:1.5; color:var(--text); }
.action-item.checked .action-text { text-decoration:line-through; color:var(--text-dimmer); }
.summary-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:28px; animation:fadeUp 0.6s ease 0.4s both; }
.summary-item { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(20px); border-radius:14px; padding:16px 12px; text-align:center; position:relative; overflow:hidden; }
.summary-item::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent); }
.summary-num { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; color:var(--text); display:block; line-height:1; margin-bottom:5px; letter-spacing:-0.02em; }
.summary-label { font-size:7px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dimmer); }
.gold-star-section { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(20px); border-radius:20px; padding:24px; margin-bottom:28px; position:relative; overflow:hidden; animation:fadeUp 0.6s ease 0.5s both; }
.gold-star-section::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(212,168,67,0.4),transparent); }
.gold-star-glow { position:absolute; top:-60px; right:-60px; width:180px; height:180px; background:radial-gradient(circle,rgba(212,168,67,0.12),transparent 70%); pointer-events:none; }
.gold-star-header { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
.star-icon { font-size:16px; color:var(--gold); filter:drop-shadow(0 0 6px var(--gold)); }
.gold-star-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:var(--text); letter-spacing:-0.01em; }
.gold-star-sub { font-size:8px; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-dimmer); margin-bottom:16px; }
.gold-star-input { width:100%; border:none; border-bottom:1px solid rgba(255,255,255,0.1); background:transparent; font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic; color:var(--text); padding:8px 0; outline:none; resize:none; min-height:40px; }
.gold-star-input::placeholder { color:var(--text-dimmer); }
.save-star-btn { margin-top:14px; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; padding:10px 20px; background:linear-gradient(135deg,var(--gold),#c49030); border:none; color:var(--bg); cursor:pointer; border-radius:100px; transition:all 0.25s; touch-action:manipulation; }
.save-star-btn:hover { transform:translateY(-1px); box-shadow:0 8px 20px rgba(212,168,67,0.35); }
.stars-log { margin-top:18px; display:flex; flex-direction:column; gap:1px; }
.star-entry { font-family:'Cormorant Garamond',serif; font-size:14px; font-style:italic; color:rgba(212,168,67,0.8); padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
.star-entry-date { font-family:'DM Mono',monospace; font-size:8px; color:var(--text-dimmer); white-space:nowrap; margin-top:3px; flex-shrink:0; font-style:normal; }
.history-section { margin-bottom:40px; animation:fadeUp 0.6s ease 0.6s both; }
.history-toggle { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--coral); background:none; border:none; cursor:pointer; padding:0; margin-bottom:16px; display:flex; align-items:center; gap:8px; transition:opacity 0.2s; }
.history-toggle:hover { opacity:0.7; }
.history-list { display:flex; flex-direction:column; gap:8px; }
.history-entry { padding:14px 18px; background:var(--glass); border:1px solid var(--glass-border); border-radius:12px; display:flex; justify-content:space-between; align-items:center; backdrop-filter:blur(10px); }
.history-date { font-size:9px; color:var(--text-dimmer); letter-spacing:0.08em; }
.history-count { font-family:'Cormorant Garamond',serif; font-size:14px; color:var(--peach); font-style:italic; }
.history-energy { font-size:8px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dimmer); }
.setup-screen { display:none; }
.setup-screen.active { display:block; }
.main-screen { display:none; }
.main-screen.active { display:block; }
.setup-intro { font-family:'Cormorant Garamond',serif; font-size:16px; line-height:1.7; color:rgba(240,237,232,0.6); margin-bottom:32px; font-style:italic; }
.setup-card { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(20px); border-radius:20px; padding:24px; margin-bottom:16px; position:relative; overflow:hidden; }
.setup-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent); }
.setup-section-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; margin-bottom:4px; color:var(--text); letter-spacing:-0.01em; }
.setup-section-sub { font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dimmer); margin-bottom:16px; }
.setup-input { width:100%; border:1px solid rgba(255,255,255,0.1); border-radius:10px; background:rgba(255,255,255,0.04); font-family:'DM Mono',monospace; font-size:12px; color:var(--text); padding:12px 14px; outline:none; margin-bottom:10px; transition:border-color 0.2s; }
.setup-input:focus { border-color:var(--coral); }
.setup-input::placeholder { color:var(--text-dimmer); }
.actions-setup { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.action-setup-row { display:flex; gap:8px; align-items:center; }
.action-setup-input { flex:1; border:1px solid rgba(255,255,255,0.08); border-radius:8px; background:rgba(255,255,255,0.03); font-family:'DM Mono',monospace; font-size:11px; color:var(--text); padding:9px 12px; outline:none; transition:border-color 0.2s; }
.action-setup-input:focus { border-color:rgba(232,113,74,0.5); }
.action-setup-input::placeholder { color:var(--text-dimmer); }
.remove-action-btn { width:26px; height:26px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:var(--text-dimmer); cursor:pointer; border-radius:50%; font-size:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; }
.remove-action-btn:hover { border-color:var(--coral); color:var(--coral); }
.add-action-btn { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.2em; text-transform:uppercase; background:none; border:1px dashed rgba(255,255,255,0.15); color:var(--text-dimmer); padding:8px 14px; cursor:pointer; border-radius:8px; transition:all 0.2s; }
.add-action-btn:hover { border-color:var(--coral); color:var(--coral); }
.energy-label-row { display:flex; align-items:center; gap:8px; margin:14px 0 8px; }
.energy-badge { font-family:'DM Mono',monospace; font-size:7px; letter-spacing:0.15em; text-transform:uppercase; padding:4px 10px; border-radius:100px; }
.badge-high { background:rgba(232,113,74,0.2); color:var(--coral); border:1px solid rgba(232,113,74,0.3); }
.badge-low { background:rgba(122,158,133,0.2); color:var(--sage); border:1px solid rgba(122,158,133,0.3); }
.quarter-setup-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:4px; }
.field-label { font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dimmer); margin-bottom:6px; display:block; }
.goal-color-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.big-btn { width:100%; padding:18px; background:linear-gradient(135deg,var(--coral),#d45a2a); border:none; color:white; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.25em; text-transform:uppercase; cursor:pointer; border-radius:14px; transition:all 0.3s; margin-top:8px; box-shadow:0 8px 30px rgba(232,113,74,0.3); }
.big-btn:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(232,113,74,0.4); }
.big-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.nav-link { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--coral); background:none; border:none; cursor:pointer; padding:0; margin-bottom:40px; display:inline-flex; align-items:center; gap:8px; transition:opacity 0.2s; }
.nav-link:hover { opacity:0.7; }
.toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(20,20,25,0.95); border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(20px); color:var(--text); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.1em; padding:12px 24px; border-radius:100px; opacity:0; transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1); pointer-events:none; z-index:200; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@media (max-width:380px) { .summary-bar { grid-template-columns:repeat(2,1fr); } .quarter-setup-grid { grid-template-columns:1fr; } }
.targets-section { display:flex; flex-direction:column; gap:12px; margin-bottom:32px; animation:fadeUp 0.6s ease 0.45s both; }
.target-card { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(20px); border-radius:20px; padding:22px; position:relative; overflow:hidden; }
.target-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent); }
.target-card.target-0 { border-top-color:rgba(232,113,74,0.4); }
.target-card.target-1 { border-top-color:rgba(138,111,212,0.4); }
.target-card.target-2 { border-top-color:rgba(212,168,67,0.4); }
.target-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.target-name { font-family:'Cormorant Garamond',serif; font-size:19px; font-style:italic; color:var(--text); line-height:1.2; }
.target-month-label { font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dimmer); padding-top:4px; }
.target-count-row { display:flex; align-items:baseline; gap:6px; margin-bottom:12px; }
.target-num { font-family:'Syne',sans-serif; font-size:36px; font-weight:800; color:var(--text); line-height:1; letter-spacing:-0.02em; }
.target-of { font-size:11px; color:var(--text-dimmer); }
.target-dots { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:16px; min-height:12px; }
.target-dot { width:8px; height:8px; border-radius:50%; transition:all 0.2s; flex-shrink:0; }
.target-dot.empty { background:rgba(255,255,255,0.08); }
.target-card.target-0 .target-dot.filled { background:var(--r1); box-shadow:0 0 5px rgba(232,113,74,0.6); }
.target-card.target-1 .target-dot.filled { background:var(--r2); box-shadow:0 0 5px rgba(138,111,212,0.6); }
.target-card.target-2 .target-dot.filled { background:var(--r3); box-shadow:0 0 5px rgba(212,168,67,0.6); }
.target-btns { display:flex; gap:8px; align-items:center; }
.target-log-btn { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; padding:10px 20px; border:none; color:white; cursor:pointer; border-radius:100px; transition:all 0.25s; touch-action:manipulation; }
.target-card.target-0 .target-log-btn { background:linear-gradient(135deg,var(--r1),#d45a2a); }
.target-card.target-1 .target-log-btn { background:linear-gradient(135deg,var(--r2),#6a50b4); }
.target-card.target-2 .target-log-btn { background:linear-gradient(135deg,var(--r3),#b08030); }
.target-log-btn:hover { transform:translateY(-1px); opacity:0.9; }
.target-undo-btn { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.15em; text-transform:uppercase; padding:9px 14px; background:transparent; border:1px solid rgba(255,255,255,0.1); color:var(--text-dimmer); cursor:pointer; border-radius:100px; transition:all 0.2s; touch-action:manipulation; }
.target-undo-btn:hover:not(:disabled) { border-color:rgba(255,255,255,0.3); color:var(--text); }
.target-undo-btn:disabled { opacity:0.25; cursor:not-allowed; }
.target-setup-card { background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(20px); border-radius:20px; padding:24px; }
.target-setup-row { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
.target-setup-name { flex:1; border:1px solid rgba(255,255,255,0.1); border-radius:10px; background:rgba(255,255,255,0.04); font-family:'DM Mono',monospace; font-size:12px; color:var(--text); padding:10px 12px; outline:none; transition:border-color 0.2s; }
.target-setup-name:focus { border-color:var(--coral); }
.target-setup-name::placeholder { color:var(--text-dimmer); }
.target-setup-goal { width:56px; border:1px solid rgba(255,255,255,0.1); border-radius:10px; background:rgba(255,255,255,0.04); font-family:'DM Mono',monospace; font-size:12px; color:var(--text); padding:10px 8px; outline:none; text-align:center; transition:border-color 0.2s; }
.target-setup-goal:focus { border-color:var(--coral); }
.target-setup-mo { font-size:8px; letter-spacing:0.1em; color:var(--text-dimmer); white-space:nowrap; }
.target-month-tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.target-month-tab { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.15em; text-transform:uppercase; padding:7px 14px; border:1px solid var(--glass-border); background:var(--glass); color:var(--text-dim); cursor:pointer; border-radius:100px; transition:all 0.25s; backdrop-filter:blur(10px); touch-action:manipulation; }
.target-month-tab.active { background:var(--coral); border-color:var(--coral); color:white; box-shadow:0 0 16px rgba(232,113,74,0.3); }
.target-hypothesis { width:100%; background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,0.08); font-family:'Cormorant Garamond',serif; font-size:14px; font-style:italic; color:var(--text-dimmer); padding:2px 0 8px; outline:none; margin-bottom:14px; transition:border-color 0.2s; }
.target-hypothesis:focus { border-bottom-color:rgba(255,255,255,0.25); color:var(--text); }
.target-hypothesis::placeholder { color:var(--text-dimmer); opacity:0.5; }
.target-card.target-0.complete { border-color:rgba(232,113,74,0.6); box-shadow:0 0 30px rgba(232,113,74,0.12),inset 0 1px 0 rgba(255,255,255,0.08); background:rgba(232,113,74,0.07); }
.target-card.target-1.complete { border-color:rgba(138,111,212,0.6); box-shadow:0 0 30px rgba(138,111,212,0.12),inset 0 1px 0 rgba(255,255,255,0.08); background:rgba(138,111,212,0.07); }
.target-card.target-2.complete { border-color:rgba(212,168,67,0.6); box-shadow:0 0 30px rgba(212,168,67,0.12),inset 0 1px 0 rgba(255,255,255,0.08); background:rgba(212,168,67,0.07); }
.target-card.target-0.complete .target-num { color:var(--r1); }
.target-card.target-1.complete .target-num { color:var(--r2); }
.target-card.target-2.complete .target-num { color:var(--r3); }
.target-complete-badge { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.15em; text-transform:uppercase; padding:5px 12px; border-radius:100px; }
.target-card.target-0 .target-complete-badge { background:rgba(232,113,74,0.15); color:var(--r1); border:1px solid rgba(232,113,74,0.3); }
.target-card.target-1 .target-complete-badge { background:rgba(138,111,212,0.15); color:var(--r2); border:1px solid rgba(138,111,212,0.3); }
.target-card.target-2 .target-complete-badge { background:rgba(212,168,67,0.15); color:var(--r3); border:1px solid rgba(212,168,67,0.3); }
.target-log-btn:disabled { opacity:0.35; cursor:not-allowed; transform:none !important; }
</style>
</head>
<body>
<div class="orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="app">
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo">Meridian</div>
    <div class="loading-sub">Loading your quarter</div>
  </div>
  <div class="setup-screen" id="setupScreen"></div>
  <div class="main-screen" id="mainScreen"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://owaypuzikzlaaocpbqwz.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YXlwdXppa3psYWFvY3BicXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjMwOTcsImV4cCI6MjA4OTU5OTA5N30.JkNSZ313-nLIFl1m5_IBimxa07lN_oQIFVMfCrG3QPg';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const GOAL_COLORS=['goal-0','goal-1','goal-2'];
let state={quarters:[],activeQuarterId:null,today:{energy:'high',checked:{},date:todayStr()}};
function todayStr(){return new Date().toISOString().split('T')[0];}
function formatDate(str){const d=new Date(str+'T00:00:00');return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}
function formatDateShort(str){const d=new Date(str+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function quarterMonthStr(q,mi){const d=new Date(q.start+'T00:00:00');d.setMonth(d.getMonth()+mi);return d.toISOString().slice(0,7);}
function quarterMonthName(q,mi){const d=new Date(q.start+'T00:00:00');d.setMonth(d.getMonth()+mi);return d.toLocaleDateString('en-US',{month:'long'});}
async function loadQuarters(){const{data}=await sb.from('quarters').select('*').order('created_at',{ascending:true});return data||[];}
async function upsertQuarter(q){await sb.from('quarters').upsert({id:q.id,name:q.name,start_date:q.start,end_date:q.end,goals:q.goals,targets:q.targets||[]});}
async function loadCheckin(quarterId,date){const{data}=await sb.from('checkins').select('*').eq('quarter_id',quarterId).eq('date',date).single();return data;}
async function upsertCheckin(quarterId,date,energy,checked){await sb.from('checkins').upsert({id:quarterId+'-'+date,quarter_id:quarterId,date,energy,checked});}
async function loadHistory(quarterId){const{data}=await sb.from('checkins').select('*').eq('quarter_id',quarterId).order('date',{ascending:false});return data||[];}
async function loadStars(quarterId){const{data}=await sb.from('stars').select('*').eq('quarter_id',quarterId).order('created_at',{ascending:false});return data||[];}
async function insertStar(quarterId,text){await sb.from('stars').insert({quarter_id:quarterId,date:todayStr(),text});}
async function loadTargetLogs(quarterId,month){const{data}=await sb.from('target_logs').select('*').eq('quarter_id',quarterId).eq('month',month);return data||[];}
async function addTargetLogEntry(quarterId,targetIndex,month){await sb.from('target_logs').insert({quarter_id:quarterId,target_index:targetIndex,date:todayStr(),month});}
async function removeLastTargetLogEntry(quarterId,targetIndex,month){const{data}=await sb.from('target_logs').select('id').eq('quarter_id',quarterId).eq('target_index',targetIndex).eq('month',month).order('created_at',{ascending:false}).limit(1);if(data&&data.length>0)await sb.from('target_logs').delete().eq('id',data[0].id);}
async function init(){
  document.getElementById('loadingScreen').style.display='flex';
  try{
    const raw=await loadQuarters();
    if(raw.length>0){
      state.quarters=raw.map(q=>({id:q.id,name:q.name,start:q.start_date,end:q.end_date,goals:q.goals,targets:q.targets||[]}));
      state.activeQuarterId=state.quarters[state.quarters.length-1].id;
      const ci=await loadCheckin(state.activeQuarterId,todayStr());
      if(ci)state.today={energy:ci.energy||'high',checked:ci.checked||{},date:todayStr()};
      document.getElementById('loadingScreen').style.display='none';
      await showMain();
    }else{
      document.getElementById('loadingScreen').style.display='none';
      showSetupScreen();
    }
  }catch(e){document.getElementById('loadingScreen').style.display='none';showSetupScreen();}
}
function showSetupScreen(){
  document.getElementById('mainScreen').classList.remove('active');
  document.getElementById('mainScreen').innerHTML='';
  document.getElementById('setupScreen').classList.add('active');
  renderSetup();
}
function renderSetup(){
  const prefill=[
    {name:"Show up as someone who belongs anywhere",values:"Ease · Warmth · Presence",high:["Say the thing you're thinking instead of editing it","Make plans with a friend you haven't seen in a while","Go somewhere alone and just exist in public","Introduce yourself to someone new without a reason to","Get dressed with intention, even for errands"],low:["Text one person something real","Put on an outfit you feel good in before leaving","Watch something that reminds you of the version of yourself you like","Sit outside, even for ten minutes"]},
    {name:"Live in a body and a home worth coming back to",values:"Care · Rootedness · Craft",high:["Lift — five days if you can, don't spiral if you can't","Cook something real instead of ordering","Go to pottery — make another mug, don't skip","Do one thing to make your apartment feel more like home","Morning routine that includes your skin"],low:["Stretch or walk — movement in any form counts","Do one small thing in your space that feels less chaotic","Wash and style your hair even when you don't feel like it","Watch a pottery video, stay connected to the craft"]},
    {name:"Trust that I have something worth giving",values:"Trust · Courage · Generosity",high:["Check your accounts — actually look, don't avoid","Say yes to something socially that scares you a little","Let yourself be taken care of without deflecting","Do one thing that is purely for your future self","Cook instead of ordering as proof you can take care of yourself"],low:["Don't make a purchase you haven't thought about for 24 hours","Text a friend instead of ordering food out of boredom","Write down one thing you brought to a situation this week","Sit with wanting something without immediately trying to fill it"]}
  ];
  const goalDots=['#E8714A','#8A6FD4','#D4A843'];
  const today=todayStr();
  const endDate=new Date();endDate.setMonth(endDate.getMonth()+3);
  const endStr=endDate.toISOString().split('T')[0];
  let goalsHTML='';
  for(let i=0;i<3;i++){
    const g=prefill[i];
    const highRows=g.high.map(a=>`<div class="action-setup-row"><input class="action-setup-input" value="${a}" type="text"><button class="remove-action-btn" onclick="removeAction(this)">×</button></div>`).join('');
    const lowRows=g.low.map(a=>`<div class="action-setup-row"><input class="action-setup-input" value="${a}" type="text"><button class="remove-action-btn" onclick="removeAction(this)">×</button></div>`).join('');
    goalsHTML+=`<div class="setup-card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><div class="goal-color-dot" style="background:${goalDots[i]}"></div><div class="setup-section-title">Goal ${i+1}</div></div><div class="setup-section-sub">Abstract goal — your desired state of being</div><input type="text" class="setup-input" id="goalName${i}" value="${g.name}" placeholder="Your abstract goal"><input type="text" class="setup-input" id="goalValues${i}" value="${g.values}" placeholder="Values"><div class="energy-label-row"><span class="energy-badge badge-high">High Energy</span></div><div class="actions-setup" id="highActions${i}">${highRows}</div><button class="add-action-btn" onclick="addAction(${i},'high')">+ Add action</button><div class="energy-label-row"><span class="energy-badge badge-low">Low Energy</span></div><div class="actions-setup" id="lowActions${i}">${lowRows}</div><button class="add-action-btn" onclick="addAction(${i},'low')">+ Add action</button></div>`;
  }
  const targetPrefill=[{name:'Gym sessions',goal:20,hyp:'I think if I lift consistently I\'ll feel more grounded in my body'},{name:'Pottery',goal:4,hyp:'I think if I show up to the studio I\'ll reconnect with making things'},{name:'Camping trip',goal:1,hyp:'I think if I plan this it will actually happen'}];
  const targetSetupRows=targetPrefill.map((t,i)=>`<div style="margin-bottom:14px"><div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><input class="target-setup-name" id="tName${i}" value="${t.name}" placeholder="Target name"><input class="target-setup-goal" id="tGoal${i}" type="number" value="${t.goal}" min="1"><span class="target-setup-mo">/ mo</span></div><input class="target-hypothesis" id="tHyp${i}" value="${t.hyp}" placeholder="I think if I do this..."></div>`).join('');
  document.getElementById('setupScreen').innerHTML=`<div class="header"><div class="header-eyebrow">Meridian</div><h1>Your <em>quarter</em></h1></div><p class="setup-intro">Name your quarter, define your three abstract goals, and build your action menus. You only do this once every three months.</p><div class="setup-card"><div class="setup-section-title">Quarter</div><div class="setup-section-sub">Name this season of your life</div><input type="text" class="setup-input" id="quarterName" value="Spring 2026" placeholder="Quarter name"><div class="quarter-setup-grid"><div><label class="field-label">Start</label><input type="date" class="setup-input" id="quarterStart" value="${today}" style="margin-bottom:0"></div><div><label class="field-label">End</label><input type="date" class="setup-input" id="quarterEnd" value="${endStr}" style="margin-bottom:0"></div></div></div>${goalsHTML}<div class="setup-card"><div class="setup-section-title">Monthly Targets</div><div class="setup-section-sub">Three micro-experiments — tracked fresh each month</div>${targetSetupRows}</div><button class="big-btn" id="beginBtn" onclick="saveSetup()">→ Begin This Quarter</button>`;
}
function addAction(goalIndex,energy){const container=document.getElementById(`${energy}Actions${goalIndex}`);const row=document.createElement('div');row.className='action-setup-row';row.innerHTML=`<input class="action-setup-input" placeholder="Add an action..." type="text"><button class="remove-action-btn" onclick="removeAction(this)">×</button>`;container.appendChild(row);}
function removeAction(btn){const row=btn.closest('.action-setup-row');const container=row.parentElement;if(container.children.length>1)row.remove();}
async function saveSetup(){
  const name=document.getElementById('quarterName').value.trim();
  const start=document.getElementById('quarterStart').value;
  const end=document.getElementById('quarterEnd').value;
  if(!name||!start||!end){showToast('Fill in quarter details');return;}
  const goals=[];
  for(let i=0;i<3;i++){
    const goalName=document.getElementById(`goalName${i}`).value.trim();
    if(!goalName){showToast(`Enter goal ${i+1}`);return;}
    goals.push({name:goalName,values:document.getElementById(`goalValues${i}`).value.trim(),actions:{high:Array.from(document.querySelectorAll(`#highActions${i} .action-setup-input`)).map(el=>el.value.trim()).filter(Boolean),low:Array.from(document.querySelectorAll(`#lowActions${i} .action-setup-input`)).map(el=>el.value.trim()).filter(Boolean)}});
  }
  const btn=document.getElementById('beginBtn');btn.disabled=true;btn.textContent='Saving...';
  const m0=[];for(let i=0;i<3;i++){const n=document.getElementById(`tName${i}`)?.value.trim();const g=parseInt(document.getElementById(`tGoal${i}`)?.value)||1;const h=document.getElementById(`tHyp${i}`)?.value.trim()||'';if(n)m0.push({name:n,goal:g,hypothesis:h});}
  const quarter={id:'q-'+Date.now(),name,start,end,goals,targets:[m0,[],[]]};
  try{
    await upsertQuarter(quarter);
    state.quarters.push(quarter);state.activeQuarterId=quarter.id;state.today={energy:'high',checked:{},date:todayStr()};
    document.getElementById('setupScreen').classList.remove('active');document.getElementById('setupScreen').innerHTML='';
    await showMain();
  }catch(e){showToast('Error saving — check connection');btn.disabled=false;btn.textContent='→ Begin This Quarter';}
}
async function showMain(){document.getElementById('mainScreen').classList.add('active');await renderMain();await upsertCheckin(state.activeQuarterId,state.today.date,state.today.energy,state.today.checked);}
function activeQuarter(){return state.quarters.find(q=>q.id===state.activeQuarterId)||state.quarters[state.quarters.length-1];}
async function renderMain(){
  const q=activeQuarter();if(!q){showSetupScreen();return;}
  const screen=document.getElementById('mainScreen');
  const now=new Date();const dayName=now.toLocaleDateString('en-US',{weekday:'long'});
  screen.innerHTML=`<div class="header"><div class="header-eyebrow">Meridian</div><h1>${dayName.slice(0,3)}<em>${dayName.slice(3)}</em></h1><div class="date-line">${formatDate(todayStr())} · ${q.name}</div></div><div class="quarter-bar" id="quarterBar"></div><div class="section-label">Energy level</div><div class="energy-row"><button class="energy-btn high ${state.today.energy==='high'?'active':''}" id="highBtn" onclick="setEnergy('high')"><div class="energy-dot"></div><span class="energy-title">High</span><span class="energy-sub">All cylinders</span></button><button class="energy-btn low ${state.today.energy==='low'?'active':''}" id="lowBtn" onclick="setEnergy('low')"><div class="energy-dot"></div><span class="energy-title">Low</span><span class="energy-sub">Gentle mode</span></button></div><div class="section-label">Today's actions</div><div class="goals-section" id="goalsSection"></div><div class="summary-bar"><div class="summary-item"><span class="summary-num" id="todayCount">0</span><span class="summary-label">Today</span></div><div class="summary-item"><span class="summary-num" id="weekCount">—</span><span class="summary-label">Week</span></div><div class="summary-item"><span class="summary-num" id="starsCount">—</span><span class="summary-label">Stars</span></div><div class="summary-item"><span class="summary-num" id="daysCount">—</span><span class="summary-label">Days in</span></div></div><div class="gold-star-section"><div class="gold-star-glow"></div><div class="gold-star-header"><span class="star-icon">★</span><span class="gold-star-title">Gold Star</span></div><div class="gold-star-sub">One thing that counts today — however small</div><textarea class="gold-star-input" id="goldStarInput" placeholder="I made my coffee at home. I went outside for ten minutes." rows="2"></textarea><button class="save-star-btn" onclick="saveStarEntry()">Log it</button><div class="stars-log" id="starsLog"></div></div><div class="section-label">Monthly targets</div><div class="targets-section" id="targetsSection"></div><div class="history-section"><button class="history-toggle" onclick="toggleHistory()"><span id="historyArrow">↓</span> Past check-ins</button><div class="history-list" id="historyList" style="display:none"></div></div><button class="nav-link" onclick="showSetupScreen()">+ New Quarter</button>`;
  renderQuarterBar();renderGoals(q);updateTodayCount();loadSummaryAsync(q);loadStarsAsync(q);loadTargetsAsync(q);
}
function renderQuarterBar(){const bar=document.getElementById('quarterBar');if(!bar)return;bar.innerHTML='';state.quarters.forEach(q=>{const btn=document.createElement('button');btn.className='quarter-btn'+(q.id===state.activeQuarterId?' active':'');btn.textContent=q.name;btn.onclick=async()=>{state.activeQuarterId=q.id;const ci=await loadCheckin(q.id,todayStr());state.today=ci?{energy:ci.energy||'high',checked:ci.checked||{},date:todayStr()}:{energy:'high',checked:{},date:todayStr()};await renderMain();};bar.appendChild(btn);});}
function renderGoals(q){const section=document.getElementById('goalsSection');if(!section)return;section.innerHTML='';q.goals.forEach((goal,gi)=>{const actions=goal.actions[state.today.energy]||[];const card=document.createElement('div');card.className=`goal-card ${GOAL_COLORS[gi]}`;card.innerHTML=`<div class="goal-accent"></div><div class="goal-number">Goal 0${gi+1}</div><div class="goal-name">${goal.name}</div><div class="goal-values">${goal.values||''}</div><div class="actions-list">${actions.map((action,ai)=>{const key=`${gi}-${state.today.energy}-${ai}`;const checked=state.today.checked[key]?'checked':'';return`<div class="action-item ${checked}" onclick="toggleAction(${gi},${ai},'${state.today.energy}')"><div class="check-box"><span class="check-mark">✓</span></div><span class="action-text">${action}</span></div>`;}).join('')}</div>`;section.appendChild(card);});}
async function setEnergy(level){state.today.energy=level;const hb=document.getElementById('highBtn');const lb=document.getElementById('lowBtn');if(hb)hb.classList.toggle('active',level==='high');if(lb)lb.classList.toggle('active',level==='low');renderGoals(activeQuarter());await upsertCheckin(state.activeQuarterId,state.today.date,level,state.today.checked);}
async function toggleAction(goalIndex,actionIndex,energy){const key=`${goalIndex}-${energy}-${actionIndex}`;state.today.checked[key]=!state.today.checked[key];renderGoals(activeQuarter());updateTodayCount();await upsertCheckin(state.activeQuarterId,state.today.date,state.today.energy,state.today.checked);}
function updateTodayCount(){const el=document.getElementById('todayCount');if(el)el.textContent=Object.values(state.today.checked).filter(Boolean).length;}
async function loadSummaryAsync(q){const start=new Date(q.start+'T00:00:00');const daysIn=Math.max(1,Math.round((new Date()-start)/86400000)+1);const daysEl=document.getElementById('daysCount');if(daysEl)daysEl.textContent=daysIn;const history=await loadHistory(q.id);const oneWeekAgo=new Date();oneWeekAgo.setDate(oneWeekAgo.getDate()-7);const weekStr=oneWeekAgo.toISOString().split('T')[0];const weekTotal=history.filter(e=>e.date>=weekStr).reduce((sum,e)=>sum+Object.values(e.checked||{}).filter(Boolean).length,0);const weekEl=document.getElementById('weekCount');if(weekEl)weekEl.textContent=weekTotal;}
async function loadStarsAsync(q){const stars=await loadStars(q.id);const starsEl=document.getElementById('starsCount');if(starsEl)starsEl.textContent=stars.length;const log=document.getElementById('starsLog');if(!log)return;if(stars.length===0){log.innerHTML='';return;}log.innerHTML=stars.slice(0,6).map(s=>`<div class="star-entry"><span>★ ${s.text}</span><span class="star-entry-date">${formatDateShort(s.date)}</span></div>`).join('');}
async function saveStarEntry(){const input=document.getElementById('goldStarInput');input.blur();const q=activeQuarter();if(!q)return;const text=input.value.trim();if(!text)return;await insertStar(q.id,text);input.value='';await loadStarsAsync(q);showToast('★ Gold star logged');}
let currentTargetLogs=[];
let activeTargetMonth=0;
async function loadTargetsAsync(q){
  const section=document.getElementById('targetsSection');if(!section)return;
  // Migrate flat format to monthly format
  if(q.targets&&q.targets.length>0&&!Array.isArray(q.targets[0])){q.targets=[q.targets,[],[]];const qi=state.quarters.findIndex(x=>x.id===q.id);if(qi>=0)state.quarters[qi].targets=q.targets;}
  else if(!q.targets||q.targets.length===0){q.targets=[[],[],[]];const qi=state.quarters.findIndex(x=>x.id===q.id);if(qi>=0)state.quarters[qi].targets=q.targets;}
  const month=quarterMonthStr(q,activeTargetMonth);
  currentTargetLogs=await loadTargetLogs(q.id,month);
  renderTargets(q);
}
function renderTargets(q){
  const section=document.getElementById('targetsSection');if(!section)return;
  const tabs=[0,1,2].map(mi=>`<button class="target-month-tab${mi===activeTargetMonth?' active':''}" onclick="switchTargetMonth(${mi})">${quarterMonthName(q,mi)}</button>`).join('');
  const monthTargets=(q.targets&&q.targets[activeTargetMonth])||[];
  const monthName=quarterMonthName(q,activeTargetMonth);
  section.innerHTML=`<div class="target-month-tabs">${tabs}</div><div id="targetCards"></div>`;
  const cardsEl=document.getElementById('targetCards');
  if(monthTargets.length===0){
    cardsEl.innerHTML=`<div class="target-setup-card"><div class="setup-section-title" style="margin-bottom:4px">${monthName} Targets</div><div class="setup-section-sub" style="margin-bottom:16px">Three micro-experiments for this month</div>${[0,1,2].map(i=>`<div style="margin-bottom:14px"><div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><input class="target-setup-name" id="itName${i}" placeholder="Target name"><input class="target-setup-goal" id="itGoal${i}" type="number" value="1" min="1"><span class="target-setup-mo">/ mo</span></div><input class="target-hypothesis" id="itHyp${i}" placeholder="I think if I do this..."></div>`).join('')}<button class="big-btn" style="margin-top:4px" onclick="saveInlineTargets()">Save ${monthName} targets</button></div>`;
    return;
  }
  monthTargets.forEach((target,ti)=>{
    const count=currentTargetLogs.filter(l=>l.target_index===ti).length;
    const goal=target.goal||1;
    const complete=count>=goal;
    const dotCount=Math.min(goal,30);
    const dots=Array.from({length:dotCount},(_,i)=>`<div class="target-dot ${i<Math.min(count,dotCount)?'filled':'empty'}"></div>`).join('');
    const card=document.createElement('div');
    card.className=`target-card target-${ti}${complete?' complete':''}`;
    card.innerHTML=`<div class="target-top"><div class="target-name">${target.name}</div>${complete?`<span class="target-complete-badge">✓ Done</span>`:''}</div><input class="target-hypothesis" value="${target.hypothesis||''}" placeholder="I think if I do this..." onblur="updateHypothesis(${ti},this.value)"><div class="target-count-row"><span class="target-num">${count}</span><span class="target-of">/ ${goal}</span></div><div class="target-dots">${dots}</div><div class="target-btns"><button class="target-log-btn" onclick="logTarget(${ti})"${complete?' disabled':''}>+1</button><button class="target-undo-btn" onclick="undoTarget(${ti})"${count===0?' disabled':''}>Undo</button></div>`;
    cardsEl.appendChild(card);
  });
}
async function switchTargetMonth(mi){
  activeTargetMonth=mi;
  const q=activeQuarter();if(!q)return;
  currentTargetLogs=await loadTargetLogs(q.id,quarterMonthStr(q,mi));
  renderTargets(q);
}
async function logTarget(ti){
  const q=activeQuarter();if(!q||!q.targets)return;
  const month=quarterMonthStr(q,activeTargetMonth);
  await addTargetLogEntry(q.id,ti,month);
  currentTargetLogs=await loadTargetLogs(q.id,month);
  renderTargets(q);
  const goal=(q.targets[activeTargetMonth]||[])[ti]?.goal||1;
  const count=currentTargetLogs.filter(l=>l.target_index===ti).length;
  showToast(count>=goal?'Target hit!':'Logged ✓');
}
async function undoTarget(ti){
  const q=activeQuarter();if(!q||!q.targets)return;
  const month=quarterMonthStr(q,activeTargetMonth);
  await removeLastTargetLogEntry(q.id,ti,month);
  currentTargetLogs=await loadTargetLogs(q.id,month);
  renderTargets(q);
}
async function saveInlineTargets(){
  const q=activeQuarter();if(!q)return;
  const targets=[];
  for(let i=0;i<3;i++){const n=document.getElementById(`itName${i}`)?.value.trim();const g=parseInt(document.getElementById(`itGoal${i}`)?.value)||1;const h=document.getElementById(`itHyp${i}`)?.value.trim()||'';if(n)targets.push({name:n,goal:g,hypothesis:h});}
  if(targets.length===0){showToast('Add at least one target');return;}
  if(!q.targets||!Array.isArray(q.targets[0]))q.targets=[[],[],[]];
  q.targets[activeTargetMonth]=targets;
  const qi=state.quarters.findIndex(x=>x.id===q.id);if(qi>=0)state.quarters[qi].targets=q.targets;
  await upsertQuarter(q);
  currentTargetLogs=await loadTargetLogs(q.id,quarterMonthStr(q,activeTargetMonth));
  renderTargets(q);
}
async function updateHypothesis(ti,value){
  const q=activeQuarter();
  if(!q||!q.targets||!q.targets[activeTargetMonth]||!q.targets[activeTargetMonth][ti])return;
  q.targets[activeTargetMonth][ti].hypothesis=value;
  const qi=state.quarters.findIndex(x=>x.id===q.id);if(qi>=0)state.quarters[qi].targets=q.targets;
  await upsertQuarter(q);
}
async function toggleHistory(){const list=document.getElementById('historyList');const arrow=document.getElementById('historyArrow');if(!list)return;const isHidden=list.style.display==='none';if(isHidden){list.style.display='flex';if(arrow)arrow.textContent='↑';const q=activeQuarter();const history=await loadHistory(q.id);if(history.length===0){list.innerHTML='<div style="font-size:10px;color:var(--text-dimmer);letter-spacing:0.1em">No past check-ins yet.</div>';return;}list.innerHTML=history.slice(0,20).map(e=>{const count=Object.values(e.checked||{}).filter(Boolean).length;return`<div class="history-entry"><span class="history-date">${formatDateShort(e.date)}</span><span class="history-count">${count} action${count!==1?'s':''}</span><span class="history-energy">${e.energy||''}</span></div>`;}).join('');}else{list.style.display='none';if(arrow)arrow.textContent='↓';}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
init();
</script>
